spring:
  application:
    name: cubanacan-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hoteles}
    username: ${DB_USER:app}
    password: ${DB_PASS:secret}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.jdbc.time_zone]": UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
